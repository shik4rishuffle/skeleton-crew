<title>Skeleton Crew logo - Stencil Bomb variant</title>
<!-- Variant A: Stencil Bomb
     Concept: Stencil-cut logo as if sprayed through rough cardboard onto concrete.
     Skull in rough torn-edge frame, tilted 2.5deg. Text below is straight.
     Stencil bridges on closed letters (S, E, O, R, A, B, D). Rough path edges. -->

