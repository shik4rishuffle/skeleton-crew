</g>

<!-- Skull - asymmetric, mischievous, stencil-feel - inside tilted frame -->
<g transform="rotate(-2.5 300 165)" fill="#f5f5f5">
  <!-- Cranium - asymmetric, rough stencil edges -->
  <path d="M222 52 C218 34 234 20 256 14 C268 10 280 8 290 8 C300 8 314 10 326 16 C348 24 362 40 358 60 L356 106 C354 118 348 130 338 140 C330 148 320 154 312 158 L312 170 C312 178 302 186 290 188 C282 190 274 192 268 192 C262 192 252 190 244 188 C232 186 224 178 224 170 L224 160 C214 154 204 148 196 140 C186 130 180 116 180 106 Z"/>
  <!-- Left eye socket - LARGER (the big eye) -->
  <ellipse cx="248" cy="82" rx="28" ry="30" fill="#0a0a0a"/>
  <!-- Right eye socket - smaller (the knowing wink) -->
  <ellipse cx="316" cy="78" rx="22" ry="24" fill="#0a0a0a"/>
  <!-- Neon green dot in the SMALLER right eye -->
  <circle cx="316" cy="78" r="9" fill="#00FF41"/>
  <!-- Nose cavity - rough, asymmetric -->
  <path d="M270 118 L280 136 L290 118 Z" fill="#0a0a0a"/>
  <!-- Teeth row - uneven, with gaps -->
  <rect x="230" y="150" width="14" height="20" rx="2" fill="#0a0a0a"/>
  <rect x="248" y="150" width="13" height="24" rx="2" fill="#0a0a0a"/>
  <rect x="265" y="150" width="14" height="18" rx="2" fill="#0a0a0a"/>
  <!-- Cracked tooth -->
  <path d="M283 150 L283 172 L288 166 L291 174 L296 150 Z" fill="#0a0a0a"/>
  <!-- Gap where tooth is missing -->
  <rect x="300" y="150" width="10" height="8" rx="1" fill="#0a0a0a"/>
  <rect x="314" y="150" width="14" height="22" rx="2" fill="#0a0a0a"/>
  <rect x="332" y="150" width="12" height="16" rx="2" fill="#0a0a0a"/>
  <!-- Asymmetric grin - wider on the left -->
  <path d="M226 170 C236 192 258 202 280 200 C302 198 322 186 336 168" stroke="#0a0a0a" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Collar bones - rough -->
  <path d="M224 210 L268 228" stroke="#f5f5f5" stroke-width="0" fill="none"/>
</g>

