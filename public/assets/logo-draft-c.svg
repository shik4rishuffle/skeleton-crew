</g>

<!-- CREW - line 2, even MORE massive, crushing tight below -->
<!-- The text overlaps where the skull's jaw would be, obscuring it -->
<g fill="#f5f5f5">
  <!-- C - heavy blocky -->
  <path d="M98 178 C86 190 80 208 80 228 C80 248 86 268 98 282 C110 294 126 300 146 300 C160 300 172 296 180 288 L180 272 L168 272 C162 280 154 284 144 286 C130 286 118 278 112 266 C106 254 104 242 104 228 C104 214 106 202 112 192 C118 182 130 176 144 176 C154 176 162 180 170 188 L182 188 L182 172 C172 164 160 160 146 160 C126 160 110 166 98 178 Z"/>
