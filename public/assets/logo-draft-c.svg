  <!-- E - blocky with notch -->
  <path d="M182 26 L182 158 L240 158 L240 144 L198 144 L198 100 L234 100 L234 86 L198 86 L198 40 L240 40 L240 26 Z M218 80 L218 76 L222 76 L222 80 Z"/>
  <!-- L - massive -->
  <path d="M252 26 L268 26 L268 144 L316 144 L316 158 L252 158 Z"/>
  <!-- E - blocky -->
  <path d="M326 26 L326 158 L384 158 L384 144 L342 144 L342 100 L378 100 L378 86 L342 86 L342 40 L384 40 L384 26 Z"/>
  <!-- T -->
  <path d="M394 26 L454 26 L454 42 L432 42 L432 158 L416 158 L416 42 L394 42 Z"/>
  <!-- O - blocky with rough inner -->
  <path d="M466 40 C460 50 458 64 458 80 C458 96 460 118 466 132 C474 146 486 156 502 158 C518 156 530 146 538 132 C544 118 546 96 546 80 C546 64 544 50 538 40 C530 28 518 22 502 22 C486 22 474 28 466 40 Z M502 36 C512 36 520 44 524 56 C528 66 530 78 530 80 C530 82 528 96 524 108 C520 120 512 128 502 128 C492 128 484 120 480 108 C476 96 474 82 474 80 C474 78 476 66 480 56 C484 44 492 36 502 36 Z"/>
  <!-- N -->
