<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 340">
<title>Skeleton Crew logo - Wheat Paste variant</title>
<!-- Variant C: Wheat Paste
     Concept: Wheat-paste poster slapped on a wall. Skull overlaps text aggressively.
     Text dominates - extremely bold, tight tracking, blocky angular letterforms.
     Skull rendered entirely in neon green (#00FF41) as a background layer behind
     off-white text. Only upper skull visible (cranium, eyes, nose) - jaw obscured by text.
     Dense rectangular block composition. -->

<!-- GREEN SKULL LAYER - sits BEHIND the text, partially visible through gaps -->
<g fill="#00FF41">
  <!-- Cranium - large, positioned to peek between/behind the two text lines -->
  <path d="M218 32 C210 8 238 -14 278 -22 C300 -26 322 -28 332 -28 C342 -28 364 -26 386 -22 C426 -14 454 8 446 32 L442 108 C440 124 432 140 418 156 C408 166 394 176 384 182 L384 200 C384 210 370 220 352 224 C342 228 336 230 332 230 C328 230 322 228 312 224 C294 220 280 210 280 200 L280 184 C268 176 254 166 244 156 C230 140 224 124 222 108 Z"/>
  <!-- Left eye socket -->
  <ellipse cx="296" cy="56" rx="36" ry="40" fill="#0a0a0a"/>
  <!-- Right eye socket -->
  <ellipse cx="370" cy="52" rx="30" ry="34" fill="#0a0a0a"/>
  <!-- Eye dot in the green skull - bright green on dark socket -->
  <circle cx="370" cy="52" r="12" fill="#00FF41"/>
  <!-- Nose cavity -->
  <path d="M318 102 L332 128 L346 102 Z" fill="#0a0a0a"/>
  <!-- Upper teeth hints visible at the boundary -->
  <rect x="286" y="152" width="14" height="18" rx="2" fill="#0a0a0a"/>
  <rect x="306" y="150" width="16" height="22" rx="2" fill="#0a0a0a"/>
  <rect x="328" y="150" width="14" height="16" rx="2" fill="#0a0a0a"/>
  <path d="M348 150 L348 170 L354 164 L358 172 L364 150 Z" fill="#0a0a0a"/>
  <rect x="370" y="150" width="14" height="20" rx="2" fill="#0a0a0a"/>
</g>

<!-- SKELETON - line 1, MASSIVE bold blocky text, tight tracking -->
<!-- These letterforms are blocky, angular, cut-from-plywood style with rough notches -->
<g fill="#f5f5f5">
  <!-- S - blocky with notched edges -->
  <path d="M18 48 L18 100 L30 100 L30 86 L72 86 L72 100 L84 100 L84 136 C84 148 74 156 58 158 L44 158 C28 156 18 148 18 136 L18 120 L30 120 L30 134 C30 140 36 144 48 146 L54 146 C66 144 72 140 72 134 L72 120 L30 120 L18 120 Z M18 48 C18 36 28 28 44 26 L58 26 C74 28 84 36 84 48 L84 66 L72 66 L72 50 C72 44 66 40 54 38 L48 38 C36 40 30 44 30 50 L30 66 L72 66 L84 66 Z"/>
  <!-- K - heavy angular -->
