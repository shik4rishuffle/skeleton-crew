<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
<title>Skeleton Crew logo</title>
<!-- Simplified skull icon - optimised for small sizes down to 32x32 -->
<g fill="none" stroke="#f5f5f5" stroke-linecap="round" stroke-linejoin="round">
<!-- Skull outline - rounded, slightly wider than tall -->
<path d="M18 30 C18 12 28 4 40 2 C46 1 50 0 50 0 C50 0 54 1 60 2 C72 4 82 12 82 30 L82 54 C82 60 80 66 76 72 C72 76 66 80 62 82 L62 86 C62 90 58 94 52 95 C51 96 50 96 50 96 C50 96 49 96 48 95 C42 94 38 90 38 86 L38 82 C34 80 28 76 24 72 C20 66 18 60 18 54 Z" stroke-width="5"/>
<!-- Left eye socket -->
<ellipse cx="38" cy="38" rx="12" ry="13" stroke-width="4"/>
<!-- Right eye socket -->
<ellipse cx="62" cy="38" rx="12" ry="13" stroke-width="4"/>
<!-- Neon green eye dot - signature -->
<circle cx="38" cy="38" r="5" fill="#00FF41" stroke="none"/>
<!-- Nose -->
<path d="M47 58 L50 64 L53 58" stroke-width="3"/>
<!-- Teeth row -->
<path d="M34 74 L66 74" stroke-width="2.5"/>
<path d="M36 74 L36 82" stroke-width="2.5"/>
<path d="M44 74 L44 84" stroke-width="2.5"/>
<path d="M52 74 L52 82" stroke-width="2.5"/>
<path d="M60 74 L60 84" stroke-width="2.5"/>
<!-- Grin curve -->
<path d="M34 82 C38 88 44 90 50 90 C56 90 62 88 66 82" stroke-width="2.5"/>
</g>
</svg>
