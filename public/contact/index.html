<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Get in touch with Skeleton Crew for bespoke web design and AI consulting.">
  <title>Contact - Skeleton Crew</title>

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
  <link rel="manifest" href="/site.webmanifest">
  <meta name="theme-color" content="#0a0a0a">

  <!-- SEO -->
  <link rel="canonical" href="https://skeleton-crew.co.uk/contact/">
  <meta property="og:title" content="Contact - Skeleton Crew">
  <meta property="og:description" content="Get in touch with Skeleton Crew for bespoke web design and AI consulting.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://skeleton-crew.co.uk/contact/">
  <meta property="og:image" content="https://skeleton-crew.co.uk/assets/og-image.jpg">
  <meta name="twitter:card" content="summary_large_image">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&family=Permanent+Marker&display=swap" rel="stylesheet">

  <!-- Stylesheets -->
  <link rel="stylesheet" href="/css/variables.css">
  <link rel="stylesheet" href="/css/reset.css">
  <link rel="stylesheet" href="/css/global.css">
  <link rel="stylesheet" href="/css/components/nav.css">
  <link rel="stylesheet" href="/css/components/hero.css">
  <link rel="stylesheet" href="/css/components/contact.css">
  <link rel="stylesheet" href="/css/components/footer.css">
</head>
<body>
  <a href="#main" class="skip-link">Skip to content</a>

  <header class="nav" role="banner">
    <div class="nav__inner container">
      <a href="/" class="nav__logo" aria-label="Skeleton Crew home">
        <img src="/assets/logo.svg" alt="Skeleton Crew" class="nav__logo-img">
        <span class="nav__logo-text">SKELETON CREW</span>
      </a>
      <nav class="nav__links" aria-label="Main navigation">
        <a href="/work/" class="nav__link">Work</a>
        <a href="/services/" class="nav__link">Services</a>
        <a href="/contact/" class="nav__link" aria-current="page">Contact</a>
      </nav>
      <button class="nav__burger" type="button" aria-expanded="false" aria-controls="nav-overlay" aria-label="Menu">
        <span class="nav__burger-line"></span>
        <span class="nav__burger-line"></span>
        <span class="nav__burger-line"></span>
      </button>
    </div>
    <div class="nav__overlay" id="nav-overlay" aria-hidden="true">
      <nav class="nav__overlay-links" aria-label="Mobile navigation">
        <a href="/work/" class="nav__overlay-link">Work</a>
        <a href="/services/" class="nav__overlay-link">Services</a>
        <a href="/contact/" class="nav__overlay-link" aria-current="page">Contact</a>
      </nav>
    </div>
  </header>

  <main id="main">
    <section class="hero hero--short">
      <div class="hero__content container">
        <h1 class="hero__headline">Let's talk.</h1>
      </div>
    </section>

    <section class="section contact">
      <div class="container contact__inner">
        <form id="contact-form" class="contact-form" action="https://api.web3forms.com/submit" method="POST">
          <input type="hidden" name="access_key" value="[FORM_HANDLER_ID]">
          <input type="hidden" name="subject" value="New enquiry from skeleton-crew.co.uk">
          <input type="hidden" name="from_name" value="Skeleton Crew Website">
          <input type="checkbox" name="botcheck" class="visually-hidden" tabindex="-1" style="display: none;">

          <div class="contact-form__field">
            <label for="name" class="contact-form__label">Name</label>
            <input type="text" id="name" name="name" class="contact-form__input" required autocomplete="name">
          </div>

          <div class="contact-form__field">
            <label for="business" class="contact-form__label">Business name</label>
            <input type="text" id="business" name="business" class="contact-form__input" autocomplete="organization">
          </div>

          <div class="contact-form__field">
            <label for="email" class="contact-form__label">Email</label>
            <input type="email" id="email" name="email" class="contact-form__input" required autocomplete="email">
          </div>

          <div class="contact-form__field">
            <label for="service" class="contact-form__label">What do you need?</label>
            <select id="service" name="service" class="contact-form__select" required>
              <option value="">Choose one</option>
              <option value="New website">New website</option>
              <option value="AI consulting">AI consulting</option>
              <option value="Both">Both</option>
              <option value="Not sure yet">Not sure yet</option>
            </select>
          </div>

          <div class="contact-form__field">
            <label for="message" class="contact-form__label">Anything else?</label>
            <textarea id="message" name="message" class="contact-form__textarea" rows="4"></textarea>
          </div>

          <button type="submit" class="btn btn--primary contact-form__submit">Send</button>
          <div id="form-status" class="contact-form__status" role="status" aria-live="polite"></div>
        </form>

        <p class="contact__email">Prefer email? <a href="mailto:f0xy_shambles@proton.me">f0xy_shambles@proton.me</a></p>
      </div>
    </section>
  </main>

  <footer class="footer" role="contentinfo">
    <div class="footer__line" aria-hidden="true"></div>
    <div class="footer__inner container">
      <div class="footer__brand">
        <a href="/" class="footer__logo" aria-label="Skeleton Crew home">
          <img src="/assets/logo.svg" alt="Skeleton Crew" class="footer__logo-img">
        </a>
        <p class="footer__tagline">Bespoke web design and AI consulting for small businesses that refuse to settle.</p>
      </div>
      <nav class="footer__nav" aria-label="Footer navigation">
        <a href="/work/" class="footer__link">Work</a>
        <a href="/services/" class="footer__link">Services</a>
        <a href="/contact/" class="footer__link">Contact</a>
      </nav>
      <p class="footer__copy">&copy; <span id="footer-year"></span> Skeleton Crew</p>
    </div>
  </footer>

  <script type="module" src="/js/main.js"></script>
</body>
</html>
